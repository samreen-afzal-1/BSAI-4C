<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>City Library Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0e0b;
      --surface:   #1a1814;
      --card:      #211f1a;
      --border:    #2e2b24;
      --gold:      #c9a84c;
      --gold-dim:  #8a7035;
      --cream:     #f0e9d8;
      --muted:     #7a7165;
      --green:     #4a7c59;
      --red:       #8b3a3a;
      --radius:    14px;
      --font-head: 'Playfair Display', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(201,168,76,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 80% 80%, rgba(74,124,89,0.05) 0%, transparent 60%);
    }

    /* ── Layout ── */
    .app {
      width: 100%;
      max-width: 900px;
      display: grid;
      grid-template-rows: auto 1fr;
      height: 90vh;
      max-height: 820px;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 20px 28px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .logo-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dim));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(201,168,76,0.25);
    }

    .header-text h1 {
      font-family: var(--font-head);
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--cream);
      letter-spacing: 0.01em;
    }

    .header-text p {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .status-dot {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      font-size: 0.75rem; color: #5a9e6f;
    }

    .dot {
      width: 8px; height: 8px;
      background: #5a9e6f;
      border-radius: 50%;
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(90,158,111,0.4); }
      50% { opacity: 0.8; box-shadow: 0 0 0 4px rgba(90,158,111,0); }
    }

    /* ── Chat Body ── */
    .chat-body {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 1px solid rgba(201,168,76,0.15);
      border-bottom: none;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Message Bubbles ── */
    .msg { display: flex; gap: 10px; align-items: flex-start; max-width: 80%; }
    .msg.user { flex-direction: row-reverse; align-self: flex-end; }
    .msg.bot  { align-self: flex-start; }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .msg.bot  .avatar { background: linear-gradient(135deg, #c9a84c22, #c9a84c44); border: 1px solid var(--gold-dim); }
    .msg.user .avatar { background: linear-gradient(135deg, #4a7c5922, #4a7c5944); border: 1px solid #4a7c59; }

    .bubble {
      padding: 14px 18px;
      border-radius: 16px;
      font-size: 0.88rem;
      line-height: 1.65;
      max-width: 100%;
    }

    .msg.bot .bubble {
      background: var(--card);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      color: var(--cream);
    }

    .msg.user .bubble {
      background: linear-gradient(135deg, #1a3528, #16301f);
      border: 1px solid #4a7c5966;
      border-top-right-radius: 4px;
      color: #d4f0de;
    }

    .bubble strong { color: var(--gold); }
    .bubble em     { color: var(--muted); font-style: italic; }

    /* ── Info Tables ── */
    .info-table {
      width: 100%; border-collapse: collapse;
      margin: 10px 0 4px;
      font-size: 0.82rem;
    }

    .info-table th {
      background: rgba(201,168,76,0.12);
      color: var(--gold);
      padding: 7px 10px;
      text-align: left;
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .info-table td {
      padding: 7px 10px;
      border-bottom: 1px solid var(--border);
      color: var(--cream);
    }

    .info-table tr.today td { background: rgba(201,168,76,0.08); color: var(--gold); }

    /* ── Book & Event Cards ── */
    .book-card, .event-card {
      background: rgba(201,168,76,0.06);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 10px;
      padding: 10px 14px;
      margin: 6px 0;
      font-size: 0.83rem;
      line-height: 1.55;
    }

    .book-id {
      float: right;
      font-size: 0.72rem;
      color: var(--muted);
      font-family: monospace;
    }

    .event-card {
      background: rgba(74,124,89,0.06);
      border-color: rgba(74,124,89,0.25);
    }

    /* ── Quick Buttons ── */
    .quick-wrap {
      padding: 12px 28px 8px;
      display: flex; flex-wrap: wrap; gap: 7px;
      border-top: 1px solid var(--border);
    }

    .quick-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 13px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-family: var(--font-body);
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .quick-btn:hover {
      border-color: var(--gold-dim);
      color: var(--gold);
      background: rgba(201,168,76,0.07);
    }

    /* ── Input Bar ── */
    footer {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 0 0 var(--radius) var(--radius);
      padding: 16px 20px;
      display: flex; gap: 10px; align-items: center;
      border-top: 1px solid rgba(201,168,76,0.15);
    }

    #user-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 16px;
      color: var(--cream);
      font-family: var(--font-body);
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s;
    }

    #user-input::placeholder { color: var(--muted); }
    #user-input:focus { border-color: var(--gold-dim); }

    #send-btn {
      background: linear-gradient(135deg, var(--gold), var(--gold-dim));
      border: none;
      width: 42px; height: 42px;
      border-radius: 10px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.2s, transform 0.15s;
      flex-shrink: 0;
    }

    #send-btn:hover { opacity: 0.9; transform: scale(1.03); }
    #send-btn svg { fill: #1a1814; }

    /* ── Typing Indicator ── */
    .typing-bubble .bubble {
      display: flex; align-items: center; gap: 5px; padding: 14px 20px;
    }

    .typing-bubble .dot-row span {
      display: inline-block;
      width: 7px; height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s ease infinite;
    }

    .typing-bubble .dot-row span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble .dot-row span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    /* ── Entrance animation ── */
    .msg { animation: fadeUp 0.3s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="app">
  <header>
    <div class="logo-icon">📚</div>
    <div class="header-text">
      <h1>City Library Assistant</h1>
      <p>Your 24/7 library companion</p>
    </div>
    <div class="status-dot"><div class="dot"></div> Online</div>
  </header>

  <div class="chat-body">
    <div class="messages" id="messages"></div>

    <div class="quick-wrap">
      <button class="quick-btn" onclick="sendQuick('What are your opening hours?')">🕐 Hours</button>
      <button class="quick-btn" onclick="sendQuick('Find fantasy books')">📚 Find Books</button>
      <button class="quick-btn" onclick="sendQuick('How do I renew a book?')">📅 Renewals</button>
      <button class="quick-btn" onclick="sendQuick('What membership plans are available?')">💳 Membership</button>
      <button class="quick-btn" onclick="sendQuick('What events are coming up?')">🎉 Events</button>
      <button class="quick-btn" onclick="sendQuick('What services do you offer?')">🛠️ Services</button>
      <button class="quick-btn" onclick="sendQuick('What is the WiFi password?')">📶 Wi-Fi</button>
      <button class="quick-btn" onclick="sendQuick('Recommend a popular book')">⭐ Recommend</button>
    </div>
  </div>

  <footer>
    <input id="user-input" type="text" placeholder="Ask me anything about the library…" autocomplete="off" />
    <button id="send-btn" aria-label="Send">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </footer>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const input = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');

  function appendMsg(role, html) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const avatar = role === 'bot' ? '📚' : '👤';
    div.innerHTML = `
      <div class="avatar">${avatar}</div>
      <div class="bubble">${html}</div>
    `;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'msg bot typing-bubble';
    div.innerHTML = `
      <div class="avatar">📚</div>
      <div class="bubble"><div class="dot-row"><span></span><span></span><span></span></div></div>
    `;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  async function sendMessage(text) {
    if (!text.trim()) return;
    appendMsg('user', escapeHtml(text));
    input.value = '';
    input.disabled = true;
    sendBtn.disabled = true;

    const typing = showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      typing.remove();
      // Convert newlines to <br> outside HTML tags
      const formatted = data.response.replace(/\n/g, '<br>');
      appendMsg('bot', formatted);
    } catch (e) {
      typing.remove();
      appendMsg('bot', '⚠️ Sorry, I couldn\'t connect. Please try again.');
    } finally {
      input.disabled = false;
      sendBtn.disabled = false;
      input.focus();
    }
  }

  function sendQuick(text) {
    input.value = text;
    sendMessage(text);
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  sendBtn.addEventListener('click', () => sendMessage(input.value));
  input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(input.value); });

  // Greeting on load
  window.addEventListener('load', () => {
    setTimeout(() => sendMessage('hello'), 400);
  });
</script>
</body>
</html>
